<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Plantas Medicinales · Herbolaria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a2e23;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --verde-profundo: #1b3b2f;
            --verde-oscuro: #2a5a45;
            --verde-medio: #3f7864;
            --verde-salvia: #7d9f8c;
            --verde-muy-claro: #eaf3ef;
            --texto-oscuro: #1a2e23;
            --texto-medio: #4a5f55;
            --texto-claro: #6d8178;
            --borde: #e0e8e3;
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        /* HEADER */
        header {
            position: sticky; top: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--borde);
            z-index: 1000;
        }
        .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; }
        .logo { font-size: 1.4rem; font-weight: 600; color: var(--verde-profundo); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 32px; }
        .nav-links a { text-decoration: none; color: var(--texto-medio); font-size: 0.95rem; font-weight: 500; }
        .nav-links a.active { color: var(--verde-oscuro); font-weight: 600; }
        .header-actions { display: flex; gap: 20px; font-size: 1.2rem; }
        .cart-container { position: relative; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: var(--verde-oscuro); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 20px; }

        /* HERO */
        .page-hero {
            background: linear-gradient(135deg, var(--verde-muy-claro) 0%, #fff 100%);
            padding: 60px 0; text-align: center; border-radius: 0 0 40px 40px;
        }
        .page-hero h1 { font-size: 2.8rem; color: var(--verde-profundo); margin-bottom: 20px; }
        .page-hero p { color: var(--texto-medio); max-width: 700px; margin: 0 auto; }

        /* FILTROS */
        .filters-bar { padding: 30px 0; border-bottom: 1px solid var(--borde); }
        .search-bar { position: relative; margin-bottom: 25px; }
        .search-bar input { width: 100%; padding: 16px 24px; border-radius: 50px; border: 1px solid var(--borde); }
        .filter-row { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 20px; align-items: center; }
        .filter-chips { display: flex; gap: 10px; flex-wrap: wrap; }
        .chip { padding: 8px 20px; border-radius: 30px; border: 1px solid var(--borde); cursor: pointer; }
        .chip.active { background: var(--verde-oscuro); color: white; border-color: var(--verde-oscuro); }
        .price-input input { width: 80px; padding: 8px; border-radius: 20px; border: 1px solid var(--borde); }
        .apply-filters { background: var(--verde-oscuro); color: white; border: none; padding: 8px 24px; border-radius: 30px; cursor: pointer; }

        /* PRODUCTOS */
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px; margin: 40px 0;
        }
        .product-card {
            background: white; border: 1px solid var(--borde); border-radius: 24px;
            overflow: hidden; transition: all 0.3s; cursor: pointer;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
        .product-image {
            aspect-ratio: 1/1; background-size: cover; background-position: center;
            background-color: var(--verde-muy-claro);
        }
        .product-content { padding: 20px; }
        .product-category { font-size: 0.7rem; color: var(--verde-medio); font-weight: 600; text-transform: uppercase; }
        .product-name { font-size: 1.2rem; font-weight: 600; margin: 5px 0; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid var(--borde); padding-top: 15px; }
        .product-price { font-weight: 700; color: var(--verde-oscuro); font-size: 1.2rem; }
        .product-add { background: var(--verde-muy-claro); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: var(--verde-oscuro); }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px);
        }
        .modal-product { background: white; width: 90%; max-width: 800px; border-radius: 30px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .modal-header { display: grid; grid-template-columns: 250px 1fr; gap: 30px; margin-bottom: 30px; }
        .modal-image { width: 100%; aspect-ratio: 1/1; border-radius: 20px; background-size: cover; background-position: center; }
        .modal-titulo h2 { font-size: 2rem; color: var(--verde-profundo); }
        .modal-add { width: 100%; padding: 16px; background: var(--verde-oscuro); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 20px; }

        /* CARRITO SIDEBAR */
        .cart-sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px;
            height: 100%; background: white; z-index: 3000; transition: 0.3s;
            display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        }
        .cart-sidebar.open { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid var(--borde); display: flex; justify-content: space-between; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid var(--borde); padding-bottom: 15px; }
        .cart-item-image { width: 60px; height: 60px; border-radius: 10px; background-size: cover; background-position: center; }
        .cart-total { padding: 20px; border-top: 1px solid var(--borde); font-weight: 700; display: flex; justify-content: space-between; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--verde-oscuro); color: white; padding: 12px 30px; border-radius: 50px; z-index: 4000; }
    </style>
</head>
