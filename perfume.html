<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>La Curandera · Cosmética Natural | Galería de imágenes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #fefcf7;
            color: #1e2f28;
            scroll-behavior: smooth;
        }
        :root {
            --verde-profundo: #1b3b2f;
            --verde-oscuro: #2a5a45;
            --verde-medio: #3f7864;
            --verde-salvia: #7d9f8c;
            --rosa-claro: #f9eef5;
            --texto-medio: #4a5f55;
            --texto-claro: #6d8178;
            --borde: #e2e9e2;
            --shadow-sm: 0 6px 12px -6px rgba(0,0,0,0.08);
            --shadow-md: 0 12px 24px -12px rgba(0,0,0,0.12);
            --shadow-lg: 0 20px 30px -12px rgba(0,0,0,0.15);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        @media (min-width: 768px) { .container { padding: 0 48px; } }

        /* HEADER */
        header { position: sticky; top: 0; background: rgba(255,253,249,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--borde); z-index: 1100; }
        .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; gap: 20px; flex-wrap: wrap; }
        .logo { font-size: 1.5rem; font-weight: 600; color: var(--verde-profundo); text-decoration: none; display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px; }
        .logo i { color: var(--verde-medio); font-size: 1.4rem; }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.6rem; color: var(--verde-profundo); cursor: pointer; }
        .nav-links { display: flex; gap: 36px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--texto-medio); font-weight: 500; font-size: 0.95rem; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--verde-oscuro); font-weight: 600; }
        .header-actions { display: flex; gap: 24px; align-items: center; }
        .header-actions i { font-size: 1.2rem; color: var(--verde-profundo); cursor: pointer; transition: all 0.2s; }
        .header-actions i:hover { color: var(--verde-medio); transform: scale(1.05); }
        .cart-container { position: relative; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: var(--verde-oscuro); color: white; font-size: 0.65rem; font-weight: 600; padding: 2px 6px; border-radius: 30px; min-width: 18px; text-align: center; }
        @media (max-width: 780px) {
            .menu-toggle { display: block; }
            .nav-links { position: fixed; top: 70px; left: -100%; width: 100%; background: white; flex-direction: column; padding: 30px 0; gap: 20px; transition: left 0.3s ease; box-shadow: var(--shadow-md); z-index: 1000; border-bottom: 1px solid var(--borde); }
            .nav-links.active { left: 0; }
            .nav-links a { font-size: 1.1rem; padding: 8px 0; }
        }

        /* HERO */
        .page-hero { background: linear-gradient(135deg, var(--rosa-claro) 0%, #fff 100%); padding: 50px 0 35px; text-align: center; border-radius: 0 0 48px 48px; margin-bottom: 20px; }
        .page-hero h1 { font-size: 2.4rem; font-weight: 500; color: var(--verde-profundo); letter-spacing: -0.5px; }
        .page-hero p { color: var(--texto-medio); max-width: 680px; margin: 12px auto 0; line-height: 1.5; }

        /* FILTROS */
        .filters-bar { background: white; padding: 20px 0; border-bottom: 1px solid var(--borde); }
        .search-bar { position: relative; margin-bottom: 20px; }
        .search-bar input { width: 100%; padding: 14px 24px; border-radius: 60px; border: 1px solid var(--borde); font-size: 0.95rem; background: white; }
        .search-bar input:focus { outline: none; border-color: var(--verde-medio); }
        .search-bar i { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); color: var(--texto-claro); }
        .filter-chips { display: flex; flex-wrap: wrap; gap: 12px; }
        .chip { padding: 8px 22px; border-radius: 40px; border: 1px solid var(--borde); background: white; color: var(--texto-medio); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .chip.active { background: var(--verde-oscuro); border-color: var(--verde-oscuro); color: white; }

        /* PRODUCTOS GRID */
        .results-count { padding: 20px 0 12px; color: var(--texto-claro); font-size: 0.9rem; border-bottom: 1px solid var(--borde); }
        .products-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; margin: 40px 0; }
        @media (min-width: 640px) { .products-grid { grid-template-columns: repeat(3,1fr); } }
        @media (min-width: 1024px) { .products-grid { grid-template-columns: repeat(4,1fr); } }
        .product-card { background: white; border: 1px solid var(--borde); border-radius: 28px; overflow: hidden; transition: all 0.25s ease; cursor: pointer; box-shadow: var(--shadow-sm); }
        .product-card:hover { transform: translateY(-5px); border-color: var(--verde-salvia); box-shadow: var(--shadow-md); }
        .product-image { aspect-ratio: 1/1; background-size: cover; background-position: center; background-color: var(--rosa-claro); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: all 0.2s; position: relative; }
        .product-content { padding: 18px; }
        .product-category { font-size: 0.7rem; text-transform: uppercase; color: var(--verde-medio); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px; }
        .product-name { font-size: 1rem; font-weight: 700; color: var(--verde-profundo); margin-bottom: 4px; }
        .product-botanical { font-size: 0.75rem; color: var(--texto-claro); margin-bottom: 12px; }
        .product-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--borde); padding-top: 14px; margin-top: 6px; }
        .product-price { font-size: 1.2rem; font-weight: 700; color: var(--verde-oscuro); }
        .product-add { background: var(--rosa-claro); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--verde-oscuro); cursor: pointer; transition: 0.2s; }
        .product-add:hover { background: var(--verde-oscuro); color: white; transform: scale(1.05); }

        /* MODAL CON GALERÍA DE IMÁGENES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,46,35,0.85); backdrop-filter: blur(8px); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-product { background: white; border-radius: 32px; max-width: 1100px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: var(--shadow-lg); animation: fadeScale 0.25s; }
        @keyframes fadeScale { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        .modal-close { position: sticky; top: 16px; right: 16px; float: right; background: white; border: none; font-size: 1.2rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; box-shadow: var(--shadow-sm); z-index: 10; margin: 16px; transition: 0.2s; color: #2c4b3c; }
        .modal-close:hover { background: var(--rosa-claro); transform: scale(1.08); }
        .modal-content { clear: both; padding: 20px 28px 36px; }
        @media (min-width: 768px) { .modal-content { padding: 20px 40px 40px; } }

        /* GALERÍA DE IMÁGENES (multiple) */
        .image-gallery { margin-bottom: 24px; }
        .gallery-main { width: 100%; aspect-ratio: 1 / 1; background: var(--rosa-claro); border-radius: 28px; overflow: hidden; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; transition: 0.2s; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
        .gallery-thumbnails { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .thumb-img { width: 70px; height: 70px; border-radius: 18px; background-size: cover; background-position: center; background-color: #f4e9ef; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; opacity: 0.8; }
        .thumb-img.active-thumb { border-color: var(--verde-oscuro); opacity: 1; transform: scale(1.02); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .thumb-img:hover { opacity: 1; transform: scale(1.02); border-color: var(--verde-salvia); }

        .modal-header-info { display: grid; grid-template-columns: 1fr; gap: 24px; margin-bottom: 28px; border-bottom: 1px solid var(--borde); padding-bottom: 24px; }
        @media (min-width: 720px) { .modal-header-info { grid-template-columns: 280px 1fr; gap: 32px; } }
        .modal-info-right h2 { font-size: 1.8rem; font-weight: 600; color: var(--verde-profundo); margin-bottom: 6px; }
        .botanical { font-size: 0.9rem; color: var(--texto-claro); margin-bottom: 14px; font-style: italic; }
        .categoria-badge { background: var(--verde-salvia); color: white; display: inline-block; padding: 4px 18px; border-radius: 40px; font-size: 0.75rem; font-weight: 600; margin-bottom: 16px; }
        .precio-modal { font-size: 1.8rem; font-weight: 700; color: var(--verde-oscuro); margin: 10px 0; }
        .modal-seccion { margin-bottom: 24px; }
        .modal-seccion h3 { font-size: 1.1rem; font-weight: 600; color: var(--verde-oscuro); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .modal-seccion p { color: var(--texto-medio); line-height: 1.6; margin-left: 0; }
        .modal-usos { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
        .uso-tag { background: var(--rosa-claro); color: var(--verde-oscuro); padding: 5px 16px; border-radius: 40px; font-size: 0.85rem; }
        .modal-add { background: var(--verde-oscuro); color: white; border: none; padding: 14px; border-radius: 50px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; }
        .modal-add:hover { background: var(--verde-profundo); transform: translateY(-2px); box-shadow: var(--shadow-md); }

        /* CARRITO */
        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; background: white; box-shadow: -8px 0 30px rgba(0,0,0,0.2); z-index: 2100; transition: right 0.3s ease; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid var(--borde); }
        .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
        .cart-item { display: flex; gap: 14px; margin-bottom: 20px; border-bottom: 1px solid var(--borde); padding-bottom: 16px; }
        .cart-item-image { width: 55px; height: 55px; background: var(--rosa-claro); border-radius: 16px; background-size: cover; background-position: center; flex-shrink: 0; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-weight: 600; color: var(--verde-profundo); }
        .cart-item-remove { background: none; border: none; color: #b1624b; font-size: 0.75rem; cursor: pointer; margin-top: 6px; }
        .cart-total { padding: 20px; border-top: 1px solid var(--borde); font-weight: 700; display: flex; justify-content: space-between; }
        .cart-checkout { margin: 0 20px 20px; background: var(--verde-oscuro); color: white; border: none; padding: 14px; border-radius: 60px; font-weight: 600; cursor: pointer; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--verde-oscuro); color: white; padding: 12px 28px; border-radius: 60px; z-index: 3000; font-size: 0.9rem; box-shadow: var(--shadow-md); animation: fadeUp 0.25s; }
        @keyframes fadeUp { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 24px; } }
        footer { background: #1a2e23; color: #d1e0d8; padding: 48px 0 28px; margin-top: 80px; border-radius: 40px 40px 0 0; }
        .footer-inner { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 32px; }
        .copyright { text-align: center; margin-top: 40px; font-size: 0.8rem; color: #7f9b8e; }
    </style>
</head>
<body>
<header>
    <div class="container header-inner">
        <a href="#" class="logo"><i class="fas fa-leaf"></i> La Curandera</a>
        <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="nav-links">
            <a href="#">Inicio</a>
            <a href="#">Plantas</a>
            <a href="#">Alimentación</a>
            <a href="#" class="active">Cosmética</a>
            <a href="#">Terapeutas</a>
            <a href="#">Ropa</a>
        </div>
        <div class="header-actions">
            <i class="fas fa-search"></i>
            <i class="fas fa-user"></i>
            <div class="cart-container">
                <i class="fas fa-shopping-bag" id="cart-icon"></i>
                <span class="cart-count" id="cart-count">0</span>
            </div>
        </div>
    </div>
</header>

<main>
    <section class="page-hero"><div class="container"><h1>Cosmética con alma vegetal</h1><p>Cremas, aceites y jabones con múltiples imágenes para conocer cada detalle artesanal</p></div></section>
    <section class="filters-bar"><div class="container"><div class="search-bar"><input type="text" id="search-input" placeholder="Buscar por nombre o ingrediente..."><i class="fas fa-search"></i></div><div class="filter-chips" id="filter-chips"></div></div></section>
    <div class="container"><div class="results-count" id="results-count"></div><div class="products-grid" id="products-grid"></div></div>
</main>

<div class="modal-overlay" id="product-modal"><div class="modal-product"><button class="modal-close" id="close-modal"><i class="fas fa-times"></i></button><div class="modal-content" id="modal-content"></div></div></div>
<div class="cart-sidebar" id="cart-sidebar"><div class="cart-header"><h3><i class="fas fa-shopping-bag"></i> Mi carrito</h3><button class="cart-close" id="close-cart"><i class="fas fa-times"></i></button></div><div class="cart-items" id="cart-items"></div><div class="cart-total" id="cart-total">Total: $0</div><button class="cart-checkout" id="checkout-btn">Finalizar compra</button></div>

<script>
    // PRODUCTOS CON MÚLTIPLES IMÁGENES (cada producto tiene un array "images")
    const productos = [
        { id: 1, name: "Crema Facial de Rosa Mosqueta", category: "cremas", botanical: "Rosa rubiginosa · Caléndula", price: 18900, description: "Hidratación profunda y regeneración celular. Ideal para pieles maduras o con manchas.", ingredients: "Aceite de rosa mosqueta, manteca de karité, extracto de caléndula, vitamina E.", uses: ["Antiarrugas", "Reparadora nocturna", "Elasticidad"], images: ["https://picsum.photos/id/104/400/400", "https://picsum.photos/id/106/400/400", "https://picsum.photos/id/134/400/400"] },
        { id: 2, name: "Jabón de Arcilla y Romero", category: "jabones", botanical: "Rosmarinus officinalis · Arcilla verde", price: 8900, description: "Purifica y equilibra pieles grasas, efecto revitalizante. Exfoliación suave.", ingredients: "Arcilla verde, aceite esencial de romero, glicerina vegetal.", uses: ["Limpieza profunda", "Control de sebo", "Exfoliante"], images: ["https://picsum.photos/id/27/400/400", "https://picsum.photos/id/28/400/400", "https://picsum.photos/id/29/400/400"] },
        { id: 3, name: "Aceite Capilar de Jojoba & Lavanda", category: "aceites", botanical: "Simmondsia chinensis · Lavandula", price: 14500, description: "Nutre el cabello seco, previene puntas abiertas y estimula el crecimiento.", ingredients: "Aceite de jojoba, lavanda, romero, vitamina E.", uses: ["Masaje capilar", "Brillo intenso", "Puntas abiertas"], images: ["https://picsum.photos/id/124/400/400", "https://picsum.photos/id/125/400/400", "https://picsum.photos/id/126/400/400"] },
        { id: 4, name: "Bálsamo Labial de Cacao y Menta", category: "labios", botanical: "Theobroma cacao · Mentha piperita", price: 5200, description: "Hidratación natural, protege del frío y otorga suavidad duradera.", ingredients: "Manteca de cacao, cera de abejas, aceite de menta, vitamina E.", uses: ["Labios agrietados", "Protección solar suave", "Aroma refrescante"], images: ["https://picsum.photos/id/66/400/400", "https://picsum.photos/id/67/400/400", "https://picsum.photos/id/68/400/400"] },
        { id: 5, name: "Mascarilla Detox de Carbón", category: "cremas", botanical: "Carbón activado · Té verde", price: 12600, description: "Elimina impurezas, minimiza poros y unifica la textura de la piel.", ingredients: "Carbón vegetal, arcilla blanca, extracto de té verde, hamamelis.", uses: ["Purificante semanal", "Poros dilatados", "Brillo natural"], images: ["https://picsum.photos/id/20/400/400", "https://picsum.photos/id/21/400/400", "https://picsum.photos/id/22/400/400"] },
        { id: 6, name: "Aceite Corporal de Almendras & Manzanilla", category: "aceites", botanical: "Prunus amygdalus · Chamomilla", price: 16200, description: "Calma pieles sensibles, hidratación sedosa post-baño.", ingredients: "Aceite de almendras dulces, extracto de manzanilla, caléndula.", uses: ["Masaje relajante", "Piel seca", "Después del sol"], images: ["https://picsum.photos/id/119/400/400", "https://picsum.photos/id/120/400/400", "https://picsum.photos/id/122/400/400"] },
        { id: 7, name: "Exfoliante Corporal de Café y Coco", category: "jabones", botanical: "Coffea arabica · Cocos nucifera", price: 11200, description: "Elimina células muertas, activa circulación y deja la piel luminosa.", ingredients: "Café molido, aceite de coco, azúcar morena, aceite esencial de naranja.", uses: ["Celulitis", "Suavidad extrema", "Energizante"], images: ["https://picsum.photos/id/130/400/400", "https://picsum.photos/id/131/400/400", "https://picsum.photos/id/132/400/400"] },
        { id: 8, name: "Crema para Manos Caléndula & Aloe", category: "cremas", botanical: "Calendula officinalis · Aloe vera", price: 7900, description: "Repara y protege manos agrietadas, de rápida absorción.", ingredients: "Aloe vera, manteca de karité, aceite de caléndula, cera de abejas.", uses: ["Manos secas", "Cutículas", "Protección diaria"], images: ["https://picsum.photos/id/159/400/400", "https://picsum.photos/id/160/400/400", "https://picsum.photos/id/161/400/400"] }
    ];

    let cart = JSON.parse(localStorage.getItem('cosmeticaCart')) || [];
    let activeCategory = "all";
    let searchTerm = "";

    function saveCart() { localStorage.setItem('cosmeticaCart', JSON.stringify(cart)); updateCartUI(); updateCartCounter(); }
    function updateCartCounter() { const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0); document.getElementById('cart-count').innerText = totalItems; }
    function updateCartUI() { const container = document.getElementById('cart-items'); if(!container) return; if(cart.length===0){ container.innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-shopping-bag" style="font-size:2.5rem; opacity:0.3;"></i><p style="margin-top:12px;">Tu carrito está vacío</p></div>`; document.getElementById('cart-total').innerHTML = `Total: $0`; return; }
        let html = ''; let total = 0;
        cart.forEach((item, idx) => { total += item.price * item.quantity;
            html += `<div class="cart-item"><div class="cart-item-image" style="background-image: url('${item.mainImage || item.images?.[0] || 'https://picsum.photos/id/13/100/100'}'); background-size:cover;"></div>
            <div class="cart-item-info"><div class="cart-item-title">${item.name}</div><div>$${item.price} x ${item.quantity}</div><button class="cart-item-remove" data-id="${item.id}">Eliminar</button></div></div>`;
        });
        container.innerHTML = html; document.getElementById('cart-total').innerHTML = `Total: $${total.toLocaleString()}`;
        document.querySelectorAll('.cart-item-remove').forEach(btn => { btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); cart = cart.filter(i => i.id !== id); saveCart(); showToast('Producto eliminado'); }); });
    }
    function addToCart(product) { const existing = cart.find(i => i.id === product.id); if(existing) existing.quantity += 1; else cart.push({ ...product, quantity: 1, mainImage: product.images?.[0] || '' }); saveCart(); showToast(`${product.name} añadido`); }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2000); }

    function renderProducts() {
        let filtered = productos.filter(p => (activeCategory === 'all' || p.category === activeCategory) && (p.name.toLowerCase().includes(searchTerm) || p.botanical.toLowerCase().includes(searchTerm)));
        const grid = document.getElementById('products-grid'); const countSpan = document.getElementById('results-count');
        countSpan.innerText = `Mostrando ${filtered.length} ${filtered.length===1?'producto':'productos'}`;
        if(filtered.length===0){ grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">✨ No encontramos productos con esos filtros ✨</div>`; return; }
        grid.innerHTML = filtered.map(p => `<div class="product-card" data-id="${p.id}"><div class="product-image" style="background-image: url('${p.images[0]}'); background-size: cover;"></div><div class="product-content"><div class="product-category">${p.category === 'cremas' ? 'CUIDADO FACIAL' : p.category === 'jabones' ? 'PIEL' : p.category === 'aceites' ? 'ACEITES ESENCIALES' : 'LABIOS / OTROS'}</div><div class="product-name">${p.name}</div><div class="product-botanical">${p.botanical}</div><div class="product-footer"><span class="product-price">$${p.price.toLocaleString()}</span><button class="product-add" data-id="${p.id}"><i class="fas fa-plus"></i></button></div></div></div>`).join('');
        document.querySelectorAll('.product-add').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const prod = productos.find(p=>p.id===id); if(prod) addToCart(prod); }); });
        document.querySelectorAll('.product-card').forEach(card => { card.addEventListener('click', (e) => { if(e.target.closest('.product-add')) return; const id = parseInt(card.dataset.id); openModal(id); }); });
    }

    function openModal(productId) {
        const prod = productos.find(p=>p.id===productId); if(!prod) return;
        const modal = document.getElementById('product-modal'); const modalContent = document.getElementById('modal-content');
        const imagesArray = prod.images && prod.images.length ? prod.images : [prod.images?.[0] || 'https://picsum.photos/id/104/400/400'];
        let galleryHtml = `<div class="image-gallery"><div class="gallery-main" id="gallery-main" style="background-image: url('${imagesArray[0]}'); background-size: cover;"></div><div class="gallery-thumbnails" id="gallery-thumbs">`;
